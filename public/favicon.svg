<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0e1a"/>
  <!-- Joystick base -->
  <rect x="14" y="42" width="36" height="10" rx="3" fill="#1a1e2e" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Joystick stick -->
  <rect x="28" y="18" width="8" height="26" rx="3" fill="#1a1e2e" stroke="#ff2d7b" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Joystick ball -->
  <circle cx="32" cy="16" r="8" fill="#1a1e2e" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Cross on ball -->
  <line x1="32" y1="11" x2="32" y2="21" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="27" y1="16" x2="37" y2="16" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Action buttons -->
  <circle cx="48" cy="34" r="3.5" fill="#ff2d7b" opacity="0.9" filter="url(#glow)"/>
  <circle cx="42" cy="28" r="3.5" fill="#39ff14" opacity="0.9" filter="url(#glow)"/>
  <!-- Decorative pixel dots -->
  <rect x="16" y="46" width="2" height="2" fill="#00f0ff" opacity="0.6"/>
  <rect x="21" y="46" width="2" height="2" fill="#ff2d7b" opacity="0.6"/>
  <rect x="41" y="46" width="2" height="2" fill="#39ff14" opacity="0.6"/>
  <rect x="46" y="46" width="2" height="2" fill="#a855f7" opacity="0.6"/>
</svg>
